name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  rust-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux build deps
        run: sudo apt-get update && sudo apt-get install -y libclang-dev cmake build-essential libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: cargo check
        working-directory: src-tauri

  tauri-build:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libclang-dev cmake build-essential libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install LLVM (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install llvm -y
      - name: Set LIBCLANG_PATH (Windows)
        if: matrix.platform == 'windows-latest'
        run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
        shell: pwsh
      - run: npm ci
      - name: Build (Linux/Windows — Vulkan GPU)
        if: matrix.platform != 'macos-latest'
        run: npm run tauri build
        env:
          CI: true
      - name: Build (macOS — Metal GPU)
        if: matrix.platform == 'macos-latest'
        run: npm run tauri build -- --features gpu-metal --no-default-features
        env:
          CI: true
